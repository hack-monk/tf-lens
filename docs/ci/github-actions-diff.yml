# TF-Lens — GitHub Actions workflow (Diff Mode)
# Generates a diff diagram comparing the PR's plan against the current state,
# highlighting added, removed, and changed resources.
#
# Usage: Copy this file to .github/workflows/tf-lens-diff.yml in your repo.

name: TF-Lens Diff Diagram

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Plan
        run: |
          terraform init -input=false

          # Generate current state snapshot
          terraform show -json > state.json 2>/dev/null || echo '{}' > state.json

          # Generate plan
          terraform plan -out=plan.bin -input=false
          terraform show -json plan.bin > plan.json
        env:
          TF_IN_AUTOMATION: true

      - name: Install TF-Lens
        run: |
          LATEST=$(curl -s https://api.github.com/repos/hack-monk/tf-lens/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -sL "https://github.com/hack-monk/tf-lens/releases/download/${LATEST}/tf-lens-linux-amd64" -o tf-lens
          chmod +x tf-lens

      - name: Generate Diff Diagram
        run: |
          ./tf-lens export \
            --plan plan.json \
            --diff state.json \
            --threat \
            --out diagram.html

          ./tf-lens export \
            --plan plan.json \
            --diff state.json \
            --threat \
            --format json \
            --out diagram.json

      - name: Build PR Comment
        id: comment
        run: |
          NODES=$(jq '.nodeCount' diagram.json)
          ADDED=$(jq '[.elements[] | select(.data.changeType == "added")] | length' diagram.json)
          REMOVED=$(jq '[.elements[] | select(.data.changeType == "removed")] | length' diagram.json)
          UPDATED=$(jq '[.elements[] | select(.data.changeType == "updated")] | length' diagram.json)
          THREATS=$(jq '[.elements[] | select(.data.threatSeverity != null and .data.threatSeverity != "")] | length' diagram.json)

          {
            echo "body<<TFLENSBODY"
            echo "## 🔭 TF-Lens Diff Diagram"
            echo ""
            echo "| Change | Count |"
            echo "|--------|-------|"
            echo "| ✅ Added | ${ADDED} |"
            echo "| ❌ Removed | ${REMOVED} |"
            echo "| 🔄 Updated | ${UPDATED} |"
            echo "| Total resources | ${NODES} |"
            echo "| ⚠️ Security findings | ${THREATS} |"
            echo ""
            echo "> Download the [diagram artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) to view the interactive diff diagram."
            echo ""
            echo "---"
            echo "*Generated by [TF-Lens](https://github.com/hack-monk/tf-lens)*"
            echo "TFLENSBODY"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: tf-lens-diff
          message: ${{ steps.comment.outputs.body }}

      - name: Upload Diagram Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-lens-diff-diagram
          path: diagram.html
          retention-days: 30
