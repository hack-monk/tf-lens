# TF-Lens — GitLab CI pipeline
# Generates an infrastructure diagram and posts it as an MR comment.
#
# Prerequisites:
#   1. Terraform plan JSON must be generated before this step
#   2. Set GITLAB_TOKEN variable with API access (api scope)
#
# Usage: Include this in your .gitlab-ci.yml or copy the relevant stages.

stages:
  - plan
  - diagram

terraform-plan:
  stage: plan
  image: hashicorp/terraform:latest
  script:
    - terraform init -input=false
    - terraform plan -out=plan.bin -input=false
    - terraform show -json plan.bin > plan.json
  artifacts:
    paths:
      - plan.json
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "**/*.tf"
        - "**/*.tfvars"

tf-lens-diagram:
  stage: diagram
  image: alpine:latest
  needs:
    - terraform-plan
  before_script:
    - apk add --no-cache curl jq
    - |
      LATEST=$(curl -s https://api.github.com/repos/hack-monk/tf-lens/releases/latest | grep tag_name | cut -d '"' -f 4)
      curl -sL "https://github.com/hack-monk/tf-lens/releases/download/${LATEST}/tf-lens-linux-amd64" -o /usr/local/bin/tf-lens
      chmod +x /usr/local/bin/tf-lens
  script:
    - tf-lens export --plan plan.json --threat --out diagram.html
    - tf-lens export --plan plan.json --threat --format json --out diagram.json
    - |
      NODES=$(jq '.nodeCount' diagram.json)
      EDGES=$(jq '.edgeCount' diagram.json)
      THREATS=$(jq '[.elements[] | select(.data.threatSeverity != null and .data.threatSeverity != "")] | length' diagram.json)

      BODY=$(cat <<MREOF
      ## 🔭 TF-Lens Infrastructure Diagram

      | Metric | Value |
      |--------|-------|
      | Resources | ${NODES} |
      | Connections | ${EDGES} |
      | Security findings | ${THREATS} |

      > Download the diagram from the [pipeline artifacts](${CI_PIPELINE_URL}).

      ---
      *Generated by [TF-Lens](https://github.com/hack-monk/tf-lens)*
      MREOF
      )

      # Post comment to MR
      curl --fail --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
        --data-urlencode "body=${BODY}"
  artifacts:
    paths:
      - diagram.html
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
