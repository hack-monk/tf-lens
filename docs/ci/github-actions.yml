# TF-Lens — GitHub Actions workflow
# Generates an infrastructure diagram and posts it as a PR comment.
#
# Prerequisites:
#   1. Install tf-lens in your CI image or download it in the workflow
#   2. Terraform plan JSON must be generated before this step
#
# Usage: Copy this file to .github/workflows/tf-lens.yml in your repo.

name: TF-Lens Diagram

on:
  pull_request:
    paths:
      - '**/*.tf'
      - '**/*.tfvars'

permissions:
  contents: read
  pull-requests: write

jobs:
  diagram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Plan
        run: |
          terraform init -input=false
          terraform plan -out=plan.bin -input=false
          terraform show -json plan.bin > plan.json
        env:
          # Add your cloud provider credentials here
          # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_IN_AUTOMATION: true

      - name: Install TF-Lens
        run: |
          LATEST=$(curl -s https://api.github.com/repos/hack-monk/tf-lens/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -sL "https://github.com/hack-monk/tf-lens/releases/download/${LATEST}/tf-lens-linux-amd64" -o tf-lens
          chmod +x tf-lens

      - name: Generate Diagram
        run: |
          ./tf-lens export --plan plan.json --threat --out diagram.html
          ./tf-lens export --plan plan.json --threat --format json --out diagram.json

      - name: Build PR Comment
        id: comment
        run: |
          NODES=$(jq '.nodeCount' diagram.json)
          EDGES=$(jq '.edgeCount' diagram.json)
          THREATS=$(jq '[.elements[] | select(.data.threatSeverity != null and .data.threatSeverity != "")] | length' diagram.json)

          {
            echo "body<<TFLENSBODY"
            echo "## 🔭 TF-Lens Infrastructure Diagram"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Resources | ${NODES} |"
            echo "| Connections | ${EDGES} |"
            echo "| Security findings | ${THREATS} |"
            echo ""
            echo "> Download the [diagram artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) to view the interactive diagram."
            echo ""
            echo "---"
            echo "*Generated by [TF-Lens](https://github.com/hack-monk/tf-lens)*"
            echo "TFLENSBODY"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: tf-lens
          message: ${{ steps.comment.outputs.body }}

      - name: Upload Diagram Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-lens-diagram
          path: diagram.html
          retention-days: 30
